name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python 3.12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q

  ios:
    name: iOS compile
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode toolchain
        run: xcodebuild -version
      - name: Build without signing
        run: |
          xcodebuild build \
            -project ios/PhoneSceneCapture/PhoneSceneCapture.xcodeproj \
            -scheme PhoneSceneCapture \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            SIDAR_GIT_COMMIT="$GITHUB_SHA"
